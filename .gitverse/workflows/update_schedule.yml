name: Update Schedule

on:
  schedule:
    - cron: "0 4 * * *"   # 07:00 МСК
    - cron: "30 10 * * *" # 13:30 МСК
    - cron: "0 18 * * *"  # 21:00 МСК
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install beautifulsoup4 icalendar requests openpyxl

      - name: Parse schedule
        run: python parse_schedule.py --days 14 --output schedule.ics

      - name: Commit and push if changed
        run: |
          git config user.name  "gitverse-actions"
          git config user.email "actions@gitverse.ru"
          git diff --quiet schedule.ics && echo "Без изменений" || (
            git add schedule.ics &&
            git commit -m "chore: update schedule $(date +'%Y-%m-%d')" &&
            git push https://volobanov5:${{ secrets.GV_TOKEN }}@gitverse.ru/volobanov5/spbgasu-schedule.git main
          )
