name: Update Schedule

on:
  schedule:
    - cron: "0 4 * * *"   # 07:00 МСК
    - cron: "30 10 * * *" # 13:30 МСК
    - cron: "0 18 * * *"  # 21:00 МСК
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install beautifulsoup4 icalendar requests caldav playwright && playwright install-deps chromium && playwright install chromium

      - name: Save old schedule
        run: |
          git show HEAD:schedule.ics > old_schedule.ics 2>/dev/null || touch old_schedule.ics
          git show HEAD:journals_state.json > old_journals_state.json 2>/dev/null || echo '{}' > old_journals_state.json

      - name: Parse schedule from portal
        env:
          PORTAL_LOGIN: ${{ secrets.PORTAL_LOGIN }}
          PORTAL_PASS:  ${{ secrets.PORTAL_PASS }}
        run: python parse_portal.py

      - name: Parse journals from portal
        continue-on-error: true
        env:
          PORTAL_LOGIN: ${{ secrets.PORTAL_LOGIN }}
          PORTAL_PASS:  ${{ secrets.PORTAL_PASS }}
        run: python parse_journals.py

      - name: Prepare notifications
        run: |
          test -f journals_state.json || echo '{}' > journals_state.json
          python notify.py old_schedule.ics schedule.ics old_journals_state.json journals_state.json

      - name: Sync to Яндекс.Календарь
        env:
          YANDEX_LOGIN:   ${{ secrets.YANDEX_LOGIN }}
          YANDEX_APPPASS: ${{ secrets.YANDEX_APPPASS }}
        run: python sync_yandex.py

      - name: Commit and push to GitVerse
        run: |
          git config user.name  "gitverse-actions"
          git config user.email "actions@gitverse.ru"
          git diff --quiet schedule.ics journals_state.json pending_notification.json && echo "Без изменений" || (
            git add schedule.ics journals_state.json pending_notification.json &&
            git commit -m "chore: update schedule $(date +'%Y-%m-%d')" &&
            git pull --rebase https://volobanov5:${{ secrets.GV_TOKEN }}@gitverse.ru/volobanov5/spbgasu-schedule.git main &&
            git push https://volobanov5:${{ secrets.GV_TOKEN }}@gitverse.ru/volobanov5/spbgasu-schedule.git main
          )

      - name: Mirror to GitHub
        run: |
          git push https://volobanov545:${{ secrets.GH_TOKEN }}@github.com/volobanov545/spbgasu-schedule.git main --force
