name: Explore Portal (one-time)

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install beautifulsoup4 playwright && playwright install-deps chromium && playwright install chromium

      - name: Explore portal
        env:
          PORTAL_LOGIN: ${{ secrets.PORTAL_LOGIN }}
          PORTAL_PASS:  ${{ secrets.PORTAL_PASS }}
        run: python3 explore_portal.py

      - name: Commit HTML dumps
        run: |
          git config user.name  "gitverse-actions"
          git config user.email "actions@gitverse.ru"
          git add portal_explore/
          git diff --cached --quiet || (
            git commit -m "debug: portal HTML dumps" &&
            git push https://volobanov5:${{ secrets.GV_TOKEN }}@gitverse.ru/volobanov5/spbgasu-schedule.git main
          )
