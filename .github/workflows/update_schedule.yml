name: Update Schedule

on:
  schedule:
    # Каждый день в 06:00 UTC = 09:00 МСК
    - cron: "0 6 * * *"
  workflow_dispatch: # Ручной запуск из GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 icalendar requests playwright
          playwright install --with-deps chromium

      - name: Parse schedule (next 14 days via Playwright)
        run: |
          python parse_schedule.py --playwright --days 14 --output schedule.ics
          echo "ICS_UPDATED=true" >> $GITHUB_ENV

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet schedule.ics && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.ics
          git commit -m "chore: update schedule $(date +'%Y-%m-%d')"
          git push

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Расписание не изменилось."
