name: Update Schedule

on:
  workflow_dispatch:  # Только ручной запуск (основной источник — локальный cron)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install beautifulsoup4 icalendar requests openpyxl

      - name: Parse from fallback HTML
        run: python parse_schedule.py --file saved_resource.html --days 14 --output schedule.ics

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet schedule.ics && echo "Без изменений" || (
            git add schedule.ics &&
            git commit -m "chore: manual update $(date +'%Y-%m-%d')" &&
            git push
          )
